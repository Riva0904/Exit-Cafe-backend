services:
  postgres:
    image: postgres:16-alpine
    container_name: exitcaff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: exitcaffdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exitcaff-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=exitcaffdb;Username=postgres;Password=postgres"
      Jwt__Secret: "${JWT_SECRET:?JWT secret must be set}"
      Jwt__Issuer: "ExitCaffApi"
      Jwt__Audience: "ExitCaffClient"
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL:-admin@exitcaff.com}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD:?Seed admin password must be set}"
      Cors__AllowedOrigins__0: "${FRONTEND_ORIGIN:-http://localhost:5173}"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
